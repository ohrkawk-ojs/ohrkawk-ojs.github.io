<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="43%" r="75%">
      <stop offset="0%" stop-color="#173D69"/>
      <stop offset="48%" stop-color="#071E35"/>
      <stop offset="100%" stop-color="#020813"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#173C64"/>
      <stop offset="1" stop-color="#08192C"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#76F7FF"/>
      <stop offset="1" stop-color="#4C8DFF"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFE4A8"/>
      <stop offset="1" stop-color="#FFB340"/>
    </linearGradient>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.16 0 0 0 0 0.75 0 0 0 0 1 0 0 0 .85 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-45%" y="-45%" width="190%" height="190%">
      <feDropShadow dx="0" dy="26" stdDeviation="26" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" stroke="#5CBDEB" stroke-opacity="0.075"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.9"/>

  <!-- left: simple installation metaphor -->
  <g opacity="0.82" filter="url(#shadow)">
    <rect x="120" y="230" width="330" height="230" rx="32" fill="url(#panel)" stroke="#5EDFFF" stroke-opacity="0.28"/>
    <rect x="166" y="284" width="238" height="24" rx="12" fill="#D8FBFF" opacity="0.34"/>
    <rect x="166" y="336" width="188" height="16" rx="8" fill="#7EEBFF" opacity="0.42"/>
    <rect x="166" y="376" width="214" height="16" rx="8" fill="#7EEBFF" opacity="0.26"/>
    <path d="M285 524v-92" stroke="#7EEBFF" stroke-width="8" stroke-linecap="round" opacity="0.38"/>
    <path d="M244 474l41-42 41 42" stroke="#7EEBFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.38"/>
  </g>

  <!-- right: organization body / workflow map -->
  <g filter="url(#shadow)">
    <path d="M1015 214 C1176 158 1390 248 1426 424 C1465 614 1302 750 1122 724 C951 700 864 551 904 398 C930 303 947 245 1015 214Z" fill="#071B2F" stroke="#6ADFFF" stroke-opacity="0.28" stroke-width="3"/>
    <circle cx="1110" cy="338" r="36" fill="#173C64" stroke="#78EFFF" stroke-opacity="0.45"/>
    <circle cx="1248" cy="308" r="28" fill="#173C64" stroke="#78EFFF" stroke-opacity="0.35"/>
    <circle cx="1310" cy="452" r="34" fill="#173C64" stroke="#78EFFF" stroke-opacity="0.4"/>
    <circle cx="1170" cy="545" r="38" fill="#173C64" stroke="#78EFFF" stroke-opacity="0.44"/>
    <circle cx="1036" cy="478" r="30" fill="#173C64" stroke="#78EFFF" stroke-opacity="0.34"/>
    <path d="M1110 338C1168 340 1205 326 1248 308C1288 354 1300 398 1310 452C1262 493 1228 520 1170 545C1126 518 1084 496 1036 478C1053 425 1070 382 1110 338Z" stroke="#69E9FF" stroke-opacity="0.32" stroke-width="5"/>
    <path d="M1010 634C1118 612 1226 639 1336 596" stroke="#FFCE75" stroke-opacity="0.33" stroke-width="4" stroke-linecap="round"/>
    <path d="M984 276C1104 232 1246 242 1378 329" stroke="#FFCE75" stroke-opacity="0.22" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- central AI core being transplanted -->
  <g filter="url(#glow)">
    <path d="M482 449 C580 426 649 418 718 432" stroke="#76F7FF" stroke-width="6" stroke-opacity="0.32" stroke-linecap="round"/>
    <path d="M884 432 C938 400 982 373 1069 345" stroke="#76F7FF" stroke-width="6" stroke-opacity="0.38" stroke-linecap="round"/>
    <path d="M884 470 C955 486 1004 511 1134 544" stroke="#76F7FF" stroke-width="6" stroke-opacity="0.35" stroke-linecap="round"/>
    <circle cx="800" cy="450" r="112" fill="#061827" stroke="url(#cyan)" stroke-width="5"/>
    <circle cx="800" cy="450" r="74" fill="none" stroke="#B8FBFF" stroke-opacity="0.6" stroke-width="3"/>
    <path d="M748 450c0-38 22-65 52-65s52 27 52 65-22 65-52 65-52-27-52-65Z" fill="#78EEFF" opacity="0.86"/>
    <path d="M782 418h36M772 450h56M782 482h36" stroke="#041827" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <circle cx="688" cy="450" r="11" fill="url(#gold)"/>
    <circle cx="912" cy="450" r="11" fill="url(#gold)"/>
    <circle cx="800" cy="338" r="11" fill="url(#gold)"/>
    <circle cx="800" cy="562" r="11" fill="url(#gold)"/>
  </g>

  <!-- human experts / change management -->
  <g filter="url(#shadow)">
    <g transform="translate(626 635)">
      <ellipse cx="174" cy="172" rx="215" ry="28" fill="#020812" opacity="0.45"/>
      <g opacity="0.8">
        <circle cx="68" cy="52" r="26" fill="#F0C7A2"/>
        <path d="M24 150c10-56 78-58 90 0" fill="#163252" stroke="#78DFFF" stroke-opacity="0.28"/>
        <circle cx="174" cy="34" r="31" fill="#F0C7A2"/>
        <path d="M121 156c11-70 96-72 108 0" fill="#183C62" stroke="#FFCF7A" stroke-opacity="0.36"/>
        <circle cx="288" cy="52" r="26" fill="#F0C7A2"/>
        <path d="M244 150c10-56 78-58 90 0" fill="#163252" stroke="#78DFFF" stroke-opacity="0.28"/>
      </g>
      <path d="M76 12C115-14 238-13 279 13" stroke="#FFCF7A" stroke-opacity="0.42" stroke-width="5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- foreground abstract headline lines, no readable text -->
  <g opacity="0.92">
    <rect x="92" y="774" width="500" height="9" rx="4.5" fill="#7DEBFF" opacity="0.62"/>
    <rect x="92" y="804" width="345" height="9" rx="4.5" fill="#D8FBFF" opacity="0.32"/>
    <rect x="92" y="834" width="408" height="9" rx="4.5" fill="#D8FBFF" opacity="0.18"/>
  </g>
</svg>
